name: PR Check

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6

      - name: 🔧 Build
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - run: |
          npm ci
          npm run lint
          npm run build

      - name: 🦭 Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: npx --yes surge ./build middag.czigler.se
